    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: "🙉MonkeyJOB"
      pageRef: /monkeyjob
      weight: 1
    - name: "🪂SkyHorse"
      pageRef: /skyhorse
      weight: 2
    - name: "📕Notes"
      pageRef: /notes
      weight: 3
    - name: "💼CV"
      pageRef: /cv
      weight: 4
    - name: "🌊Faraway Life"
      pageRef: /faraway-life
      weight: 5
    - name: Search
      weight: 6
      params:
        type: search
    - name: GitHub
      weight: 7
      url: "https://github.com/StarsExpress"
      params:
        icon: github
    - name: Theme
      weight: 8
      params:
        type: theme-toggle

params:
