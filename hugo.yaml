title: 🏔️Faraway's Way

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - ['$$', '$$']
            - ['\[', '\]']
          inline:
            - ['$', '$']
            - ['\(', '\)']
  highlight:
    noClasses: false

menu:
  main:
    - name: "✨LinesShines"
      pageRef: /linesshines
      weight: 1
    - name: "🙉MonkeyJOB"
      pageRef: /monkeyjob
      weight: 2
    - name: "🪂SkyHorse"
      pageRef: /skyhorse
      weight: 3
    - name: "📕Notes"
      pageRef: /notes
      weight: 4
    - name: "💼Résumé"
      pageRef: /resume
      weight: 5
    - name: "🌊Faraway Life"
      pageRef: /faraway-life
      weight: 6
    - name: Search
      weight: 7
      params:
        type: search
        math: true
    - name: GitHub
      weight: 8
      url: "https://github.com/StarsExpress"
      params:
        icon: github
    - name: Theme
      weight: 9
      params:
        type: theme-toggle

params:
  page:
    width: wide

  navbar:
    displayTitle: true
    displayLogo: false

  theme:
    displayToggle: false

  footer:
    displayCopyright: false
    displayPoweredBy: false

  editURL:
    enable: false
